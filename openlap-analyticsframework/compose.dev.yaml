# Local-development overrides for compose.yaml.
#
# Compose does NOT auto-discover this file (only compose.override.yaml is
# auto-merged), so pass it explicitly on top of the base file:
#
#   docker compose -f compose.yaml -f compose.dev.yaml up -d
#
# Start only MongoDB (the usual VS Code / host-run workflow runs Spring Boot
# on the host with ./mvnw spring-boot:run):
#
#   docker compose -f compose.yaml -f compose.dev.yaml up -d mongo
#
# Everything here only benefits local development and must NOT be applied to a
# production deployment.

services:
  mongo:
    # Publish MongoDB to the host so local tooling (mongosh, Compass) and a
    # host-run Spring Boot can reach it on localhost:27017. In production the
    # app talks to Mongo over the internal Compose network, so the port stays
    # closed.
    ports:
    - "27017:27017"

  openlap-analyticsframework:
    environment:
      # Surface the application's own INFO logs (goal seeding, login attempts,
      # Mongo connection) while keeping the framework quiet. See
      # application.properties -> logging.level.com.openlap.
      OPENLAP_LOG_LEVEL: info
      # Allow the app to boot with the insecure dev defaults (JWT_SECRET_KEY=secret,
      # ADMIN_PASSWORD=1234qweR) set in the base compose.yaml. The P0 fail-fast guard
      # (SecurityDefaultsValidator) otherwise refuses to start. This downgrades the
      # failure to a warning and must NEVER be set in a real deployment — it lives
      # here in the dev-only override, not in the base compose.yaml.
      ALLOW_INSECURE_DEFAULTS: "true"
